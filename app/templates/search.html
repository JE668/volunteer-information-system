{% extends "base.html" %}
{% block title %}学校查询{% endblock %}
{% block content %}
<div class="max-w-[1600px] mx-auto px-4">
    <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-200 mb-8">
        <div class="grid grid-cols-1 md:grid-cols-5 lg:grid-cols-7 gap-4">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">选择年份</label>
                <select id="yearSelect" class="w-full p-2 border rounded-md outline-none focus:ring-2 focus:ring-indigo-500">
                    <option value="2025">2025年</option>
                    <option value="2024">2024年</option>
                    <option value="2023">2023年</option>
                </select>
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">学校类别</label>
                <select id="typeSelect" class="w-full p-2 border rounded-md outline-none focus:ring-2 focus:ring-indigo-500">
                    <option value="all" selected>全部</option>
                    <option value="pg">普通高中</option>
                    <option value="voc">中职学校</option>
                </select>
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">学校属性</label>
                <select id="attrSelect" class="w-full p-2 border rounded-md outline-none focus:ring-2 focus:ring-indigo-500">
                    <option value="">全部</option>
                    <option value="公办">公办</option>
                    <option value="民办">民办</option>
                </select>
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">批次筛选</label>
                <select id="batchSelect" class="w-full p-2 border rounded-md outline-none focus:ring-2 focus:ring-indigo-500">
                    <option value="">全部批次</option>
                    {% for b in batches %}
                    <option value="{{ b }}">{{ b }}</option>
                    {% endfor %}
                </select>
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">计划类型</label>
                <select id="scoreTypeSelect" class="w-full p-2 border rounded-md outline-none focus:ring-2 focus:ring-indigo-500">
                    <option value="">全部</option>
                    {% for st in score_types %}
                    <option value="{{ st }}" {% if st == "普通高中" %}selected{% endif %}>{{ st }}</option>
                    {% endfor %}
                </select>
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">细分方向</label>
                <select id="subTypeSelect" class="w-full p-2 border rounded-md outline-none focus:ring-2 focus:ring-indigo-500" disabled>
                    <option value="">请先选择计划类型</option>
                </select>
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">收费类型</label>
                <select id="feeSelect" class="w-full p-2 border rounded-md outline-none focus:ring-2 focus:ring-indigo-500">
                    <option value="">全部</option>
                    <option value="公费">公费</option>
                    <option value="自费">自费</option>
                    <option value="参公">参公</option>
                </select>
            </div>
            <div class="md:col-span-5 lg:col-span-7 flex justify-end mt-2">
                <button id="searchBtn" class="w-full md:w-40 gradient-bg text-white font-bold py-2 rounded-md hover:opacity-90 transition">查询学校</button>
            </div>
        </div>
    </div>
    <div class="bg-white rounded-2xl shadow-sm border border-gray-200 overflow-hidden">
    <table class="w-full text-left border-collapse">
    <thead class="bg-gray-50 text-gray-600 text-sm uppercase font-medium">
    <tr id="headerRow">
    <!-- 动态生成表头 -->
    </tr>
    </thead>
    <tbody id="schoolList" class="divide-y text-gray-700">
    <tr><td colspan="12" class="px-6 py-12 text-center text-gray-400 italic">请选择条件并点击查询</td></tr>
    </tbody>
    </table>
    </div>
</div>


<script>
async function updateFilters() {
    const yearSelect = document.getElementById('yearSelect');
    const batchSelect = document.getElementById('batchSelect');
    const scoreTypeSelect = document.getElementById('scoreTypeSelect');
    if (!yearSelect || !batchSelect || !scoreTypeSelect) return;

    const year = yearSelect.value;
    try {
        const res = await fetch(`/api/filters?year=${year}`);
        if (!res.ok) throw new Error(`API Error: ${res.status}`);
        const data = await res.json();
        
        let batchHtml = '<option value="">全部批次</option>';
        if (data.batches && data.batches.length > 0) {
            batchHtml += data.batches.map(b => `<option value="${b}">${b}</option>`).join('');
        } else {
            batchHtml = '<option value="">无批次数据</option>';
        }
        batchSelect.innerHTML = batchHtml;
        
        let scoreTypeHtml = '<option value="">全部</option>';
        if (data.score_types && data.score_types.length > 0) {
            scoreTypeHtml += data.score_types.map(st => `<option value="${st}">${st}</option>`).join('');
            scoreTypeSelect.innerHTML = scoreTypeHtml;
            scoreTypeSelect.value = '';
        } else {
            scoreTypeSelect.innerHTML = '<option value="">无类型数据</option>';
        }
    } catch (e) {
        console.error('Filter update failed:', e);
        batchSelect.innerHTML = '<option value="">加载失败</option>';
        scoreTypeSelect.innerHTML = '<option value="">加载失败</option>';
    }
}

function renderHeader(type, scoreType) {
    const headerRow = document.getElementById('headerRow');
    if (!headerRow) return;
    
    const showJuniorCol = (scoreType === '指标生' || scoreType === '');
    
    let html = `
    <th class="px-6 py-4 border-b">年份</th>
    <th class="px-6 py-4 border-b">批次</th>
    <th class="px-6 py-4 border-b">计划类型</th>
    <th class="px-6 py-4 border-b">计划属性</th>`;
    
    if (showJuniorCol) {
        html += `<th class="px-6 py-4 border-b">初中学校</th>`;
    }
    
    html += `
    <th class="px-6 py-4 border-b">高中学校名称</th>
    <th class="px-6 py-4 border-b">细分专业/方向</th>
    <th class="px-6 py-4 border-b">学校属性</th>
    <th class="px-6 py-4 border-b">收费类型</th>
    <th class="px-6 py-4 border-b">报考条件</th>
    <th class="px-6 py-4 border-b text-right">普高线</th>
    <th class="px-6 py-4 border-b text-right">指标线</th>
    <th class="px-6 py-4 border-b text-center">分差</th>
    `;
    headerRow.innerHTML = html;
}
    
    html += `
    <th class="px-6 py-4 border-b">高中学校名称</th>
    <th class="px-6 py-4 border-b">细分专业/方向</th>
    <th class="px-6 py-4 border-b">学校属性</th>
    <th class="px-6 py-4 border-b">收费类型</th>
    <th class="px-6 py-4 border-b">报考条件</th>
    <th class="px-6 py-4 border-b text-right">分数线</th>
    `;
    headerRow.innerHTML = html;
}

function renderRow(s, scoreType) {
    const showJuniorCol = (scoreType === '指标生' || scoreType === '');
    let displayMajor = s.major_name || s.plan_type || '-';
    
    let cells = [
        `<td class="px-6 py-4 text-sm">${s.year || '-'}</td>`,
        `<td class="px-6 py-4 text-sm">${s.batch || '-'}</td>`,
        `<td class="px-6 py-4 text-xs"><span class="${s.type === 'voc' ? 'bg-gray-100 text-gray-600' : 'bg-indigo-50 text-indigo-600'} px-2 py-0.5 rounded font-medium">${s.score_type || '-'}</span></td>`,
        `<td class="px-6 py-4 text-xs text-gray-500">${s.plan_type || '-'}</td>`
    ];

    if (showJuniorCol) {
        cells.push(`<td class="px-6 py-4 text-sm text-gray-600">${s.junior_school || '-'}</td>`);
    }

    if (s.type === 'voc') {
        cells.push(`<td class="px-6 py-4 font-medium">${s.school_name || '-'}</td>`);
        cells.push(`<td class="px-6 py-4 font-medium">${s.major_code ? `[${String(s.major_code).padStart(3, '0')}] ` : ''}${displayMajor}</td>`);
    } else {
        cells.push(`<td class="px-6 py-4 font-medium text-gray-900">${s.school_name || '-'}</td>`);
        cells.push(`<td class="px-6 py-4 text-sm text-indigo-600 font-medium">${displayMajor}</td>`);
    }

    cells.push(`<td class="px-6 py-4 text-xs text-gray-500">${s.school_attr || '-'}</td>`);
    cells.push(`<td class="px-6 py-4 text-sm">${s.fee_type || '-'}</td>`);
    
    let reqs = '';
    if (s.subject_grade_req) reqs += `<span class="bg-blue-100 text-blue-700 px-2 py-0.5 rounded text-xs font-medium">${s.subject_grade_req}</span>`;
    if (s.subject_grade_total_req) reqs += `<span class="bg-indigo-100 text-indigo-700 px-2 py-0.5 rounded text-xs font-medium ml-1">总分${s.subject_grade_total_req}</span>`;
    if (!reqs) reqs = '<span class="text-gray-400">无</span>';
    cells.push(`<td class="px-6 py-4 text-xs">${reqs}</td>`);
    
    // SCORE COMPARISON LOGIC
    if (s.score_type === '指标生' && s.regular_score !== null && s.regular_score !== undefined) {
        const diff = s.min_score - s.regular_score;
        const diffColor = diff < 0 ? 'text-green-600' : (diff > 0 ? 'text-red-600' : 'text-gray-600');
        const diffSign = diff > 0 ? '+' : '';
        
        cells.push(`<td class="px-6 py-4 text-right font-mono text-gray-500">${s.regular_score}分</td>`);
        cells.push(`<td class="px-6 py-4 text-right font-mono font-bold text-indigo-600">${s.min_score}分</td>`);
        cells.push(`<td class="px-6 py-4 text-center font-mono font-bold ${diffColor}">${diffSign}${diff}分</td>`);
    } else {
        // Default view for non-indicator students
        cells.push(`<td class="px-6 py-4 text-right text-gray-400">-</td>`);
        cells.push(`<td class="px-6 py-4 text-right font-mono font-bold text-indigo-600">${s.min_score !== null && s.min_score !== undefined ? s.min_score + '分' : '无'}</td>`);
        cells.push(`<td class="px-6 py-4 text-center text-gray-400">-</td>`);
    }

    return `<tr class="hover:bg-gray-50 transition">${cells.join('')}</tr>`;
}

    // IMPORTANT: Ensure school_name is ALWAYS shown
    if (s.type === 'voc') {
        cells.push(`<td class="px-6 py-4 font-medium">${s.school_name || '-'}</td>`);
        cells.push(`<td class="px-6 py-4 font-medium">${s.major_code ? `[${String(s.major_code).padStart(3, '0')}] ` : ''}${displayMajor}</td>`);
    } else {
        cells.push(`<td class="px-6 py-4 font-medium text-gray-900">${s.school_name || '-'}</td>`);
        cells.push(`<td class="px-6 py-4 text-sm text-indigo-600 font-medium">${displayMajor}</td>`);
    }

    cells.push(`<td class="px-6 py-4 text-xs text-gray-500">${s.school_attr || '-'}</td>`);
    cells.push(`<td class="px-6 py-4 text-sm">${s.fee_type || '-'}</td>`);
    
    let reqs = '';
    if (s.subject_grade_req) reqs += `<span class="bg-blue-100 text-blue-700 px-2 py-0.5 rounded text-xs font-medium">${s.subject_grade_req}</span>`;
    if (s.subject_grade_total_req) reqs += `<span class="bg-indigo-100 text-indigo-700 px-2 py-0.5 rounded text-xs font-medium ml-1">总分${s.subject_grade_total_req}</span>`;
    if (!reqs) reqs = '<span class="text-gray-400">无</span>';
    cells.push(`<td class="px-6 py-4 text-xs">${reqs}</td>`);
    
    cells.push(`<td class="px-6 py-4 text-right font-mono font-bold text-indigo-600">${s.min_score !== null && s.min_score !== undefined ? s.min_score + '分' : '无'}</td>`);

    return `<tr class="hover:bg-gray-50 transition">${cells.join('')}</tr>`;
}

document.addEventListener('DOMContentLoaded', () => {
    const searchBtn = document.getElementById('searchBtn');
    const yearSelect = document.getElementById('yearSelect');
    const batchSelect = document.getElementById('batchSelect');
    const scoreTypeSelect = document.getElementById('scoreTypeSelect');
    const subTypeSelect = document.getElementById('subTypeSelect');
    const typeSelect = document.getElementById('typeSelect');

    if (!searchBtn || !yearSelect || !batchSelect || !scoreTypeSelect) return;

    searchBtn.onclick = async () => {
        try {
            const year = yearSelect.value;
            const type = typeSelect.value;
            const attr = document.getElementById('attrSelect').value;
            const fee = document.getElementById('feeSelect').value;
            const batch = batchSelect.value;
            const scoreType = scoreTypeSelect.value;
            const subCategory = subTypeSelect.value;
            
            renderHeader(type, scoreType);
            const params = new URLSearchParams({ 
                year, type, attr, fee, batch, 
                score_type: scoreType, 
                sub_category: subCategory 
            });
            const res = await fetch(`/api/schools?${params.toString()}`);
            if (!res.ok) throw new Error('Search API response not ok');
            const data = await res.json();
            const list = document.getElementById('schoolList');
            
            if (!data.length) {
                list.innerHTML = '<tr><td colspan="12" class="px-6 py-12 text-center text-gray-400 italic">未找到相关数据</td></tr>';
                return;
            }

            // PERFORMANCE FIX: Limit rendering to first 500 rows to prevent browser crash
            const LIMIT = 500;
            const slicedData = data.slice(0, LIMIT);
            const hasMore = data.length > LIMIT;
            
            list.innerHTML = slicedData.map(s => renderRow(s, scoreType)).join('');
            
            if (hasMore) {
                list.innerHTML += `<tr><td colspan="12" class="px-6 py-8 text-center text-sm text-orange-500 font-medium bg-orange-50 italic">结果过多（共${data.length}条），为保证流畅度仅显示前 ${LIMIT} 条。请通过更多筛选条件缩小范围。</td></tr>`;
            }
        } catch (e) {
            console.error('Search execution failed:', e);
            alert('查询失败，请检查网络或刷新页面');
        }
    };

    yearSelect.onchange = updateFilters;

    batchSelect.onchange = async function() {
        const batch = this.value;
        const year = yearSelect.value;
        try {
            const res = await fetch(`/api/filters/types?year=${year}&batch=${batch}`);
            if (!res.ok) throw new Error('Type Linkage API failed');
            const data = await res.json();
            scoreTypeSelect.innerHTML = '<option value="">全部</option>';
            if (data.score_types && data.score_types.length > 0) {
                data.score_types.forEach(st => {
                    scoreTypeSelect.innerHTML += `<option value="${st}">${st}</option>`;
                });
                scoreTypeSelect.value = '';
            }
        } catch (e) {
            console.error('Batch-Type linkage failed:', e);
        }
    };

    scoreTypeSelect.onchange = async function() {
        const scoreType = this.value;
        subTypeSelect.innerHTML = '';
        
        if (scoreType === '艺术生' || scoreType === '学科类自主招生') {
            batchSelect.value = '提前批';
        }
        
        if (scoreType === '指标生') {
            subTypeSelect.disabled = false;
            subTypeSelect.innerHTML = '<option value="">全部初中</option>';
            try {
                const res = await fetch(`/api/filters/junior_schools?year=${yearSelect.value}`);
                const data = await res.json();
                if (data.length > 0) {
                    data.forEach(js => {
                        const opt = document.createElement('option');
                        opt.value = js;
                        opt.textContent = js;
                        subTypeSelect.appendChild(opt);
                    });
                }
            } catch (e) {
                console.error('Junior school fetch failed:', e);
                subTypeSelect.innerHTML = '<option value="">加载失败</option>';
            }
            return;
        }
        
        const mappings = {
            '艺术生': ['全部', '音乐', '美术', '舞蹈', '戏剧'],
            '学科类自主招生': ['全部', '数学类', '物理类', '化学类', '生物类']
        };
        
        if (mappings[scoreType]) {
            subTypeSelect.disabled = false;
            mappings[scoreType].forEach(opt => {
                const el = document.createElement('option');
                el.value = opt === '全部' ? '' : opt;
                el.textContent = opt;
                subTypeSelect.appendChild(el);
            });
        } else {
            subTypeSelect.disabled = true;
            subTypeSelect.innerHTML = '<option value="">请先选择计划类型</option>';
        }
    };
});
</script>

{% endblock %}
