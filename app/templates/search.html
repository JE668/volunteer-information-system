{% extends "base.html" %}
{% block title %}学校查询{% endblock %}
{% block content %}
<div class="max-w-[1600px] mx-auto px-4">
    <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-200 mb-8">
        <div class="grid grid-cols-1 md:grid-cols-5 lg:grid-cols-7 gap-4">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">选择年份</label>
                <select id="yearSelect" class="w-full p-2 border rounded-md outline-none focus:ring-2 focus:ring-indigo-500">
                    <option value="2025">2025年</option>
                    <option value="2024">2024年</option>
                    <option value="2023">2023年</option>
                </select>
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">学校类别</label>
                <select id="typeSelect" class="w-full p-2 border rounded-md outline-none focus:ring-2 focus:ring-indigo-500">
                    <option value="all" selected>全部</option>
                    <option value="pg">普通高中</option>
                    <option value="voc">中职学校</option>
                </select>
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">学校属性</label>
                <select id="attrSelect" class="w-full p-2 border rounded-md outline-none focus:ring-2 focus:ring-indigo-500">
                    <option value="">全部</option>
                    <option value="公办">公办</option>
                    <option value="民办">民办</option>
                </select>
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">批次筛选</label>
                <select id="batchSelect" class="w-full p-2 border rounded-md outline-none focus:ring-2 focus:ring-indigo-500">
                    <option value="">加载中...</option>
                </select>
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">计划类型</label>
                <select id="scoreTypeSelect" class="w-full p-2 border rounded-md outline-none focus:ring-2 focus:ring-indigo-500">
                    <option value="">加载中...</option>
                </select>
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">细分方向</label>
                <select id="subTypeSelect" class="w-full p-2 border rounded-md outline-none focus:ring-2 focus:ring-indigo-500" disabled>
                    <option value="">请先选择计划类型</option>
                </select>
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">收费类型</label>
                <select id="feeSelect" class="w-full p-2 border rounded-md outline-none focus:ring-2 focus:ring-indigo-500">
                    <option value="">全部</option>
                    <option value="公费">公费</option>
                    <option value="自费">自费</option>
                    <option value="参公">参公</option>
                </select>
            </div>
            <div class="md:col-span-5 lg:col-span-7 flex justify-end mt-2">
                <button id="searchBtn" class="w-full md:w-40 gradient-bg text-white font-bold py-2 rounded-md hover:opacity-90 transition">查询学校</button>
            </div>
        </div>
    </div>
    <div class="bg-white rounded-2xl shadow-sm border border-gray-200 overflow-hidden">
    <table class="w-full text-left border-collapse">
    <thead class="bg-gray-50 text-gray-600 text-sm uppercase font-medium">
    <tr id="headerRow">
    <!-- 动态生成表头 -->
    </tr>
    </thead>
    <tbody id="schoolList" class="divide-y text-gray-700">
    <tr><td colspan="12" class="px-6 py-12 text-center text-gray-400 italic">请选择条件并点击查询</td></tr>
    </tbody>
    </table>
    </div>
</div>

<script>
// 核心联动逻辑：刷新计划类型
async function updateScoreTypes() {
    const year = document.getElementById('yearSelect').value;
    const batch = document.getElementById('batchSelect').value;
    const scoreTypeSelect = document.getElementById('scoreTypeSelect');
    
    try {
        const res = await fetch(`/api/filters/types?year=${year}&batch=${batch}`);
        const data = await res.json();
        
        scoreTypeSelect.innerHTML = '<option value="">全部</option>';
        if (data.score_types && data.score_types.length > 0) {
            data.score_types.forEach(st => {
                scoreTypeSelect.innerHTML += `<option value="${st}">${st}</option>`;
            });

            // 智能匹配默认类型：如果包含“普通高中”则选中，否则选中第一个
            if (data.score_types.includes('普通高中')) {
                scoreTypeSelect.value = '普通高中';
            } else {
                scoreTypeSelect.value = data.score_types[0];
            }
        }
    } catch (e) {
        console.error('Failed to update score types:', e);
    }
}

// 初始化过滤器：年份 -> 批次 -> 类型
async function updateFilters() {
    const year = document.getElementById('yearSelect').value;
    const batchSelect = document.getElementById('batchSelect');
    
    try {
        const res = await fetch(`/api/filters?year=${year}`);
        const data = await res.json();
        
        batchSelect.innerHTML = '<option value="">全部批次</option>';
        data.batches.forEach(b => {
            batchSelect.innerHTML += `<option value="${b}">${b}</option>`;
        });
        
        // 批次加载完后，立即同步刷新计划类型
        await updateScoreTypes();
    } catch (e) {
        console.error('Failed to update filters:', e);
    }
}

function renderHeader(type) {
    const headerRow = document.getElementById('headerRow');
    if (type === 'voc') {
    headerRow.innerHTML = `
    <th class="px-6 py-4 border-b">年份</th>
    <th class="px-6 py-4 border-b">批次</th>
    <th class="px-6 py-4 border-b">计划类型</th>
    <th class="px-6 py-4 border-b">专业代码</th>
    <th class="px-6 py-4 border-b">细分专业/方向</th>
    <th class="px-6 py-4 border-b">学校属性</th>
    <th class="px-6 py-4 border-b">收费类型</th>
    <th class="px-6 py-4 border-b">报考条件</th>
    <th class="px-6 py-4 border-b text-right">分数线</th>
    `;
    } else {
    headerRow.innerHTML = `
    <th class="px-6 py-4 border-b">年份</th>
    <th class="px-6 py-4 border-b">批次</th>
    <th class="px-6 py-4 border-b">计划类型</th>
    <th class="px-6 py-4 border-b">计划属性</th>
    <th class="px-6 py-4 border-b">学校名称</th>
    <th class="px-6 py-4 border-b">细分专业/方向</th>
    <th class="px-6 py-4 border-b">学校属性</th>
    <th class="px-6 py-4 border-b">收费类型</th>
    <th class="px-6 py-4 border-b">报考条件</th>
    <th class="px-6 py-4 border-b text-right">分数线</th>
    `;
    }
}

function renderRow(s) {
    let displayMajor = s.major_name || '-';
    if (s.type === 'voc') {
    return `
    <tr class="hover:bg-gray-50 transition">
    <td class="px-6 py-4 text-sm">${s.year || '-'}</td>
    <td class="px-6 py-4 text-sm">${s.batch || '-'}</td>
    <td class="px-6 py-4 text-xs"><span class="bg-gray-100 text-gray-600 px-2 py-0.5 rounded font-medium">${s.score_type || '-'}</span></td>
    <td class="px-6 py-4 text-xs">${s.major_code || '-'}</td>
    <td class="px-6 py-4 font-medium">${displayMajor}</td>
    <td class="px-6 py-4 text-xs text-gray-500">${s.school_attr || '-'}</td>
    <td class="px-6 py-4 text-sm">${s.fee_type || '-'}</td>
    <td class="px-6 py-4 text-xs">
        ${s.subject_grade_req ? `<span class="bg-blue-100 text-blue-700 px-2 py-0.5 rounded text-xs font-medium">${s.subject_grade_req}</span>` : ''}
        ${s.subject_grade_total_req ? `<span class="bg-indigo-100 text-indigo-700 px-2 py-0.5 rounded text-xs font-medium ml-1">总分${s.subject_grade_total_req}</span>` : ''}
        ${(!s.subject_grade_req && !s.subject_grade_total_req) ? '<span class="text-gray-400">无</span>' : ''}
    </td>
    <td class="px-6 py-4 text-right font-mono font-bold text-indigo-600">${s.min_score !== null && s.min_score !== undefined ? s.min_score + '分' : '无'}</td>
    </tr>
    `;
    } else {
    return `
    <tr class="hover:bg-gray-50 transition">
    <td class="px-6 py-4 text-sm">${s.year || '-'}</td>
    <td class="px-6 py-4 text-sm">${s.batch || '-'}</td>
    <td class="px-6 py-4 text-xs"><span class="bg-indigo-50 text-indigo-600 px-2 py-0.5 rounded font-medium">${s.score_type || '-'}</span></td>
    <td class="px-6 py-4 text-xs text-gray-500">${s.plan_type || '-'}</td>
    <td class="px-6 py-4 font-medium">${s.school_name || '-'}</td>
    <td class="px-6 py-4 text-sm text-indigo-600 font-medium">${displayMajor}</td>
    <td class="px-6 py-4 text-xs text-gray-500">${s.school_attr || '-'}</td>
    <td class="px-6 py-4 text-sm">${s.fee_type || '-'}</td>
    <td class="px-6 py-4 text-xs">
        ${s.subject_grade_req ? `<span class="bg-blue-100 text-blue-700 px-2 py-0.5 rounded text-xs font-medium">${s.subject_grade_req}</span>` : ''}
        ${s.subject_grade_total_req ? `<span class="bg-indigo-100 text-indigo-700 px-2 py-0.5 rounded text-xs font-medium ml-1">总分${s.subject_grade_total_req}</span>` : ''}
        ${(!s.subject_grade_req && !s.subject_grade_total_req) ? '<span class="text-gray-400">无</span>': ''}
    </td>
    <td class="px-6 py-4 text-right font-mono font-bold text-indigo-600">${s.min_score !== null && s.min_score !== undefined ? s.min_score + '分' : '无'}</td>
    </tr>
    `;
    }
}

document.getElementById('searchBtn').onclick = async () => {
    const year = document.getElementById('yearSelect').value;
    const type = document.getElementById('typeSelect').value;
    const attr = document.getElementById('attrSelect').value;
    const fee = document.getElementById('feeSelect').value;
    const batch = document.getElementById('batchSelect').value;
    const scoreType = document.getElementById('scoreTypeSelect').value;
    const subCategory = document.getElementById('subTypeSelect').value;
    
    renderHeader(type);
    const res = await fetch(`/api/schools?year=${year}&type=${type}&attr=${attr}&fee=${fee}&batch=${batch}&score_type=${scoreType}&sub_category=${subCategory}`);
    const data = await res.json();
    const list = document.getElementById('schoolList');
    list.innerHTML = data.length ? data.map(s => renderRow(s)).join('') : '<tr><td colspan="12" class="px-6 py-12 text-center text-gray-400 italic">未找到相关数据</td></tr>';
};

document.getElementById('yearSelect').onchange = updateFilters;
document.getElementById('batchSelect').onchange = updateScoreTypes;
document.getElementById('scoreTypeSelect').onchange = function() {
    const scoreType = this.value;
    const subTypeSelect = document.getElementById('subTypeSelect');
    const batchSelect = document.getElementById('batchSelect');
    subTypeSelect.innerHTML = '';
    
    if (scoreType === '艺术生' || scoreType === '学科类自主招生') {
        batchSelect.value = '提前批';
    }

    const mappings = {
        '艺术生': ['全部', '音乐', '美术', '舞蹈', '戏剧'],
        '学科类自主招生': ['全部', '数学类', '物理类', '化学类', '生物类']
    };
    
    if (mappings[scoreType]) {
        subTypeSelect.disabled = false;
        mappings[scoreType].forEach(opt => {
            const el = document.createElement('option');
            el.value = opt === '全部' ? '' : opt;
            el.textContent = opt;
            subTypeSelect.appendChild(el);
        });
    } else {
        subTypeSelect.disabled = true;
        subTypeSelect.innerHTML = '<option value="">请先选择计划类型</option>';
    }
};

updateFilters();
</script>
{% endblock %}
