{% extends "base.html" %}
{% block title %}智能模拟{% endblock %}
{% block content %}
<div class="max-w-4xl mx-auto">
    <div class="bg-white p-8 rounded-2xl shadow-sm border border-gray-200 mb-8">
        <h2 class="text-2xl font-bold mb-6 flex items-center">
            <i class="fas fa-calculator mr-3 text-indigo-600"></i>分数匹配计算器
        </h2>
        <form id="simulateForm" class="grid grid-cols-1 md:grid-cols-4 gap-4">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">中考总分</label>
                <input type="number" name="score" required placeholder="如: 580" class="w-full p-2 border rounded-md focus:ring-2 focus:ring-indigo-500 outline-none">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">对比年份</label>
                <select name="year" class="w-full p-2 border rounded-md focus:ring-2 focus:ring-indigo-500 outline-none">
                    <option value="2025">2025年</option>
                    <option value="2024">2024年</option>
                    <option value="2023">2023年</option>
                </select>
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">学校类型</label>
                <select name="type" class="w-full p-2 border rounded-md focus:ring-2 focus:ring-indigo-500 outline-none">
                    <option value="pg">普通高中</option>
                    <option value="voc">中职学校</option>
                </select>
            </div>
            <div class="flex items-end">
                <button type="submit" class="w-full gradient-bg text-white font-bold py-2 rounded-md hover:opacity-90 transition">开始模拟</button>
            </div>
        </form>
    </div>

    <div id="results" class="hidden space-y-6">
        <div class="flex items-center justify-between mb-4">
            <h3 class="text-xl font-bold">模拟结果</h3>
            <div id="scoreBadge" class="px-3 py-1 bg-indigo-100 text-indigo-700 rounded-full text-sm font-bold"></div>
        </div>
        
        <div class="grid grid-cols-1 gap-6">
            <!-- 冲 -->
            <div class="bg-white rounded-xl shadow-sm border-l-4 border-red-500 overflow-hidden">
                <div class="bg-red-50 px-4 py-2 border-b border-red-100 flex justify-between items-center">
                    <span class="font-bold text-red-700"><i class="fas fa-fire mr-2"></i>冲 (Rush) - 风险较高，有机会</span>
                    <span class="text-xs text-red-600">分差 0 ~ 15 分</span>
                </div>
                <div id="rushList" class="divide-y"></div>
            </div>
            <!-- 稳 -->
            <div class="bg-white rounded-xl shadow-sm border-l-4 border-yellow-500 overflow-hidden">
                <div class="bg-yellow-50 px-4 py-2 border-b border-yellow-100 flex justify-between items-center">
                    <span class="font-bold text-yellow-700"><i class="fas fa-balance-scale mr-2"></i>稳 (Stable) - 录取概率较大</span>
                    <span class="text-xs text-yellow-600">分差 15 ~ 40 分</span>
                </div>
                <div id="stableList" class="divide-y"></div>
            </div>
            <!-- 保 -->
            <div class="bg-white rounded-xl shadow-sm border-l-4 border-green-500 overflow-hidden">
                <div class="bg-green-50 px-4 py-2 border-b border-green-100 flex justify-between items-center">
                    <span class="font-bold text-green-700"><i class="fas fa-shield-alt mr-2"></i>保 (Backup) - 极高概率录取</span>
                    <span class="text-xs text-green-600">分差 > 40 分</span>
                </div>
                <div id="backupList" class="divide-y"></div>
            </div>
        </div>
    </div>
</div>

<script>
document.getElementById('simulateForm').onsubmit = async (e) => {
    e.preventDefault();
    const formData = new FormData(e.target);
    const params = new URLSearchParams(formData);
    const res = await fetch(`/api/match?${params.toString()}`);
    const data = await res.json();
    
    if(data.error) return alert(data.error);
    
    document.getElementById('results').classList.remove('hidden');
    document.getElementById('scoreBadge').innerText = `总分: ${data.score} | 等级: ${data.grade}`;
    
    const renderList = (list, elementId) => {
        const el = document.getElementById(elementId);
        el.innerHTML = list.length ? list.map(s => `
            <div class="p-4 flex justify-between items-center hover:bg-gray-50 transition">
                <div>
                    <div class="font-bold text-gray-800">${s.school_name} ${s.major_name ? `(${s.major_name})` : ''}</div>
                    <div class="text-xs text-gray-500">${s.fee_type || '未知'} | ${s.batch || ''}</div>
                </div>
                <div class="text-right">
                    <div class="font-mono font-bold text-indigo-600">${s.min_score}分</div>
                    <div class="text-xs text-gray-400">分差: ${s.diff > 0 ? '+' : ''}${s.diff}</div>
                </div>
            </div>
        `).join('') : '<div class="p-4 text-gray-400 text-sm italic">暂无匹配学校</div>';
    };
    
    renderList(data.rush, 'rushList');
    renderList(data.stable, 'stableList');
    renderList(data.backup, 'backupList');
};
</script>
{% endblock %}
