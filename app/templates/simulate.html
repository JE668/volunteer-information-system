{% extends "base.html" %}
{% block title %}智能模拟{% endblock %}
{% block content %}
<!-- 禁止浏览器缓存 -->
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">

<div class="max-w-6xl mx-auto">
    <div class="bg-white p-8 rounded-2xl shadow-sm border border-gray-200 mb-8">
        <div class="flex items-center justify-between mb-6">
            <h2 class="text-2xl font-bold flex items-center">
                <i class="fas fa-calculator mr-3 text-indigo-600"></i>智能志愿匹配模拟
            </h2>
            <div class="flex items-center gap-4">
                <label class="text-sm font-medium text-gray-600">对比年份</label>
                <select id="yearSelect" class="p-2 border rounded-md outline-none focus:ring-2 focus:ring-indigo-500">
                    <option value="2025">2025年</option>
                    <option value="2024">2024年</option>
                    <option value="2023">2023年</option>
                </select>
            </div>
        </div>

        <!-- 模式切换 Tab -->
        <div class="flex p-1 bg-gray-100 rounded-xl mb-8 w-fit">
            <button id="tabA" onclick="switchMode('A')" class="px-6 py-2 rounded-lg font-bold transition-all duration-200 bg-white text-indigo-600 shadow-sm">A 类 (成绩体系)</button>
            <button id="tabB" onclick="switchMode('B')" class="px-6 py-2 rounded-lg font-bold transition-all duration-200 text-gray-500 hover:text-gray-700">B 类 (成绩体系)</button>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <!-- 输入区域 -->
            <div class="lg:col-span-1 space-y-6">
                <div class="bg-gray-50 p-6 rounded-xl border border-gray-200">
                    <h3 class="font-bold text-gray-700 mb-4 flex items-center">
                        <i class="fas fa-edit mr-2"></i>成绩输入
                    </h3>
                    
                    <div class="space-y-4">
                        <div>
                            <label class="block text-xs font-bold text-gray-500 uppercase mb-1">总分 (含体育)</label>
                            <input type="number" id="totalScore" placeholder="如: 580" class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none text-lg font-mono">
                        </div>

                        <div id="gradeGrid" class="grid grid-cols-2 gap-3">
                            <!-- 动态加载科目 -->
                        </div>
                    </div>
                </div>

                <button id="simulateBtn" class="w-full gradient-bg text-white font-bold py-4 rounded-xl hover:opacity-90 transition shadow-lg text-lg">
                    开始匹配模拟
                </button>
            </div>

<!-- 结果区域 -->
 <div class="lg:col-span-2">
 <div id="emptyState" class="h-full flex flex-col items-center justify-center text-center p-12 border-2 border-dashed border-gray-200 rounded-2xl text-gray-400">
 <i class="fas fa-magic text-4xl mb-4 opacity-20"></i>
 <p>输入成绩并点击开始模拟<br>系统将根据总分及等级科目要求进行匹配</p>
 </div>

 <!-- C 等级警告信息 -->
 <div id="cGradeWarning" class="hidden bg-yellow-50 border-l-4 border-yellow-400 p-4 rounded-lg mb-6">
 <div class="flex">
 <div class="flex-shrink-0">
 <i class="fas fa-exclamation-triangle text-yellow-400"></i>
 </div>
 <div class="ml-3">
 <p id="cGradeWarningText" class="text-sm text-yellow-700 font-medium"></p>
 </div>
 </div>
 </div>

 <!-- 中职学校推荐区域（A 类含 C 时显示） -->
 <div id="zhizhongArea" class="hidden bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden mb-6">
 <div class="bg-blue-50 px-4 py-3 border-b border-blue-100 flex justify-between items-center">
 <span class="font-bold text-blue-700"><i class="fas fa-graduation-cap mr-2"></i>中职学校推荐</span>
 <span class="text-xs text-blue-600">A 类考生可报考</span>
 </div>
 <div id="zhizhongList" class="divide-y"></div>
 </div>

 <div id="resultsArea" class="hidden space-y-8">
                    <div class="flex flex-col md:flex-row md:items-center justify-between gap-4">
                        <h3 class="text-xl font-bold text-gray-800">匹配结果分析</h3>
                        <div id="gradeDashboard" class="flex gap-3">
                            <!-- 等级分看板 -->
                        </div>
                    </div>

                    <div class="grid grid-cols-1 gap-6">
                        <!-- 冲 -->
                        <div class="bg-white rounded-xl shadow-sm border-l-4 border-red-500 overflow-hidden">
                            <div class="bg-red-50 px-4 py-3 border-b border-red-100 flex justify-between items-center">
                                <span class="font-bold text-red-700"><i class="fas fa-fire mr-2"></i>冲 (Rush)</span>
                                <div class="flex items-center gap-3">
                                    <span class="text-xs font-medium text-red-600 bg-red-100 px-2 py-0.5 rounded">分差 -10 ~ 10</span>
                                    <button onclick="toggleAll('rush')" id="btnAllRush" class="text-xs text-red-600 hover:underline font-bold">显示全部</button>
                                </div>
                            </div>
                            <div id="rushList" class="divide-y"></div>
                        </div>
                        <!-- 稳 -->
                        <div class="bg-white rounded-xl shadow-sm border-l-4 border-yellow-500 overflow-hidden">
                            <div class="bg-yellow-50 px-4 py-3 border-b border-yellow-100 flex justify-between items-center">
                                <span class="font-bold text-yellow-700"><i class="fas fa-balance-scale mr-2"></i>稳 (Stable)</span>
                                <div class="flex items-center gap-3">
                                    <span class="text-xs font-medium text-yellow-600 bg-yellow-100 px-2 py-0.5 rounded">分差 10 ~ 30</span>
                                    <button onclick="toggleAll('stable')" id="btnAllStable" class="text-xs text-yellow-600 hover:underline font-bold">显示全部</button>
                                </div>
                            </div>
                            <div id="stableList" class="divide-y"></div>
                        </div>
                        <!-- 保 -->
                        <div class="bg-white rounded-xl shadow-sm border-l-4 border-green-500 overflow-hidden">
                            <div class="bg-green-50 px-4 py-3 border-b border-green-100 flex justify-between items-center">
                                <span class="font-bold text-green-700"><i class="fas fa-shield-alt mr-2"></i>保 (Backup)</span>
                                <div class="flex items-center gap-3">
                                    <span class="text-xs font-medium text-green-600 bg-green-100 px-2 py-0.5 rounded">分差 > 30</span>
                                    <button onclick="toggleAll('backup')" id="btnAllBackup" class="text-xs text-green-600 hover:underline font-bold">显示全部</button>
                                </div>
                            </div>
                            <div id="backupList" class="divide-y"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
let currentMode = 'A';
let allData = { rush: [], stable: [], backup: [] };
const subjectConfigs = {
    'A': { 'bio': '生物', 'geo': '地理', 'his': '历史', 'pol': '道法' },
    'B': { 'bio': '生物', 'geo': '地理', 'phy': '物理', 'che': '化学' }
};

function switchMode(mode) {
    currentMode = mode;
    document.getElementById('tabA').className = mode === 'A' ? 'px-6 py-2 rounded-lg font-bold transition-all duration-200 bg-white text-indigo-600 shadow-sm' : 'px-6 py-2 rounded-lg font-bold transition-all duration-200 text-gray-500 hover:text-gray-700';
    document.getElementById('tabB').className = mode === 'B' ? 'px-6 py-2 rounded-lg font-bold transition-all duration-200 bg-white text-indigo-600 shadow-sm' : 'px-6 py-2 rounded-lg font-bold transition-all duration-200 text-gray-500 hover:text-gray-700';
    
    // 切换模式时，强制清空结果区域，防止 A/B 类结果混淆
    document.getElementById('resultsArea').classList.add('hidden');
    document.getElementById('emptyState').classList.remove('hidden');
    allData = { rush: [], stable: [], backup: [] };
    
    renderGradeInputs();
}

function renderGradeInputs() {
    const grid = document.getElementById('gradeGrid');
    const config = subjectConfigs[currentMode];
    grid.innerHTML = Object.entries(config).map(([id, name]) => `
        <div>
            <label class="block text-xs font-bold text-gray-500 uppercase mb-1">${name}</label>
 <select id="grade_${id}" class="w-full p-2 border rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none bg-white">
 <option value="A+" selected>A+</option>
 <option value="A">A</option>
 <option value="B+">B+</option>
 <option value="B">B</option>
 <option value="C">C</option>
 </select>
        </div>
    `).join('');
}

function toggleAll(type) {
    const list = allData[type];
    const el = document.getElementById(type + 'List');
    const btn = document.getElementById('btnAll' + type.charAt(0).toUpperCase() + type.slice(1));
    
    if (btn.innerText === '显示全部') {
        renderList(list, type + 'List');
        btn.innerText = '收起';
    } else {
        renderList(list.slice(0, 4), type + 'List');
        btn.innerText = '显示全部';
    }
}

const renderList = (list, elementId) => {
    const el = document.getElementById(elementId);
    el.innerHTML = list.length ? list.map(s => `
        <div class="p-4 flex justify-between items-center hover:bg-gray-50 transition">
            <div>
                <div class="flex items-center gap-2">
                    <div class="font-bold text-gray-800">${s.school_name}</div>
                    <span class="px-2 py-0.5 bg-green-100 text-green-700 text-[10px] font-bold rounded-full">等级: 通过</span>
                </div>
                <div class="text-xs text-gray-500">${s.school_attr} | ${s.fee_type} | ${s.batch} | ${s.plan_type || ''}</div>
            </div>
            <div class="text-right">
                <div class="font-mono font-bold text-indigo-600">${s.min_score}分</div>
                <div class="text-xs ${s.diff > 0 ? 'text-green-600' : 'text-red-600'} font-medium">分差: ${s.diff > 0 ? '+' : ''}${s.diff}</div>
            </div>
        </div>
    `).join('') : '<div class="p-4 text-gray-400 text-sm italic text-center">暂无符合条件的学校</div>';
};

document.getElementById('simulateBtn').onclick = async () => {
    try {
        const year = document.getElementById('yearSelect').value;
        const total = document.getElementById('totalScore').value;
        if(!total) return alert('请输入总分');

        const params = new URLSearchParams();
        params.append('year', year);
        params.append('type', 'pg');

        if(currentMode === 'A') {
            params.append('score_a', total);
            params.append('bio_a', document.getElementById('grade_bio').value);
            params.append('geo_a', document.getElementById('grade_geo').value);
            params.append('his_a', document.getElementById('grade_his').value);
            params.append('pol_a', document.getElementById('grade_pol').value);
        } else {
            params.append('score_b', total);
            params.append('bio_b', document.getElementById('grade_bio').value);
            params.append('geo_b', document.getElementById('grade_geo').value);
            params.append('phy_b', document.getElementById('grade_phy').value);
            params.append('che_b', document.getElementById('grade_che').value);
        }

const res = await fetch(`/api/match?${params.toString()}`);
 if (!res.ok) {
 const errText = await res.text();
 throw new Error(`服务器错误 (${res.status}): ${errText}`);
 }
 const data = await res.json();
 if(data.error) return alert(data.error);

document.getElementById('emptyState').classList.add('hidden');

// 处理 C 等级情况
const cGradeWarning = document.getElementById('cGradeWarning');
const cGradeWarningText = document.getElementById('cGradeWarningText');
const zhizhongArea = document.getElementById('zhizhongArea');
const resultsArea = document.getElementById('resultsArea');

// 根据当前模式获取对应的结果数据
let resultData = currentMode === 'A' ? data.res_a : data.res_b;

// 检查是否有 C 等级警告
if (resultData && resultData.has_c_grade && resultData.c_grade_note) {
 // A 类或 B 类含 C
 cGradeWarning.classList.remove('hidden');
 cGradeWarningText.textContent = resultData.c_grade_note;
 
 // 如果是 A 类含 C 且可以报考中职，显示中职学校
 if (resultData.can_apply_zhi_zhong && currentMode === 'A') {
  zhizhongArea.classList.remove('hidden');
  // 加载中职学校数据
  loadZhizhongSchools(year, total);
  // A 类含 C 时，隐藏普通高中结果区
  resultsArea.classList.add('hidden');
 } else {
  zhizhongArea.classList.add('hidden');
  // B 类含 C，隐藏普通高中结果区
  resultsArea.classList.add('hidden');
 }
 return; // 结束，不显示普通高中结果
} else {
 // 没有 C 等级，正常显示
 cGradeWarning.classList.add('hidden');
 resultsArea.classList.remove('hidden');
 // A 类用户显示中职学校推荐
 if (currentMode === 'A') {
  zhizhongArea.classList.remove('hidden');
  loadZhizhongSchools(year, total);
 } else {
  zhizhongArea.classList.add('hidden');
 }
}

// 正常情况：显示普通高中匹配结果
const userTotal = currentMode === 'A' ? data.user_total_a : data.user_total_b;
const dashboard = document.getElementById('gradeDashboard');
dashboard.innerHTML = `
<div class="px-3 py-1 bg-indigo-100 text-indigo-700 rounded-full text-xs font-bold">
等级总分：${userTotal} 分
</div>
<div class="px-3 py-1 ${userTotal >= 12 ? 'bg-green-100 text-green-700' : 'bg-yellow-100 text-yellow-700'} rounded-full text-xs font-bold">
${userTotal >= 12 ? '满足绝大多数要求' : '部分学校要求较高'}
</div>
`;

resultData = currentMode === 'A' ? data.res_a : data.res_b;
allData = resultData;
 
renderList(allData.rush.slice(0, 4), 'rushList');
 renderList(allData.stable.slice(0, 4), 'stableList');
 renderList(allData.backup.slice(0, 4), 'backupList');
 
 document.getElementById('btnAllRush').innerText = allData.rush.length > 4 ? '显示全部' : '全部已显示';
 document.getElementById('btnAllStable').innerText = allData.stable.length > 4 ? '显示全部' : '全部已显示';
document.getElementById('btnAllBackup').innerText = allData.backup.length > 4 ? '显示全部' : '全部已显示';
 } catch (e) {
 console.error(e);
 alert('模拟请求失败：' + e.message);
 }
};

// 页面加载完成后初始化
document.addEventListener('DOMContentLoaded', function() {
 console.log('DOMContentLoaded triggered');
 console.log('Current mode:', currentMode);
 renderGradeInputs();
 console.log('Grade inputs rendered');
});
</script>

<!-- 加载中职学校数据的函数 -->
<script>
async function loadZhizhongSchools(year, totalScore) {
 try {
 const params = new URLSearchParams();
 params.append('year', year);
 params.append('type', 'voc'); // 中职类型
 
 const res = await fetch(`/api/match?${params.toString()}`);
 if (!res.ok) {
 console.error('加载中职学校失败:', res.status);
 return;
 }
 
 const data = await res.json();
 const zhizhongList = document.getElementById('zhizhongList');
 
 // 根据分数筛选可报考的中职学校
 const applicable = [];
 const notApplicable = [];
 
 if (data.zhizhong && data.zhizhong.length > 0) {
 data.zhizhong.forEach(s => {
 if (totalScore >= s.min_score) {
 applicable.push(s);
 } else {
 notApplicable.push(s);
 }
 });
 
 applicable.sort((a, b) => b.min_score - a.min_score);
 notApplicable.sort((a, b) => b.min_score - a.min_score);
 
 const all = [...applicable, ...notApplicable];
 
 if (all.length === 0) {
 zhizhongList.innerHTML = '<div class="p-4 text-gray-400 text-sm italic text-center">暂无符合条件的中职学校</div>';
 } else {
 zhizhongList.innerHTML = all.slice(0, 10).map(s => `
 <div class="p-4 flex justify-between items-center hover:bg-gray-50 transition">
 <div>
 <div class="font-bold text-gray-800">${s.school_name} - ${s.major_name || ''}</div>
 <div class="text-xs text-gray-500">${s.school_attr} | ${s.fee_type} | ${s.batch}</div>
 </div>
 <div class="text-right">
 <div class="font-mono font-bold ${totalScore >= s.min_score ? 'text-green-600' : 'text-red-600'}">
 ${s.min_score}分
 </div>
 <div class="text-xs ${totalScore >= s.min_score ? 'text-green-600' : 'text-red-600'}">
 ${totalScore >= s.min_score ? '可报考' : '分数不足'}
 </div>
 </div>
 </div>
 `).join('');
 }
 } else {
 zhizhongList.innerHTML = '<div class="p-4 text-gray-400 text-sm italic text-center">暂无中职学校数据</div>';
 }
 } catch (e) {
 console.error('加载中职学校失败:', e);
 }
}
</script>
{% endblock %}
