{% extends "base.html" %}
{% block title %}指标生查询{% endblock %}
{% block content %}
<div class="max-w-5xl mx-auto">
    <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-200 mb-8 text-center">
        <h2 class="text-2xl font-bold mb-2">指标生录取分布查询</h2>
        <p class="text-gray-500 text-sm">查询各初中在普高的指标生录取最低分数线分布情况</p>
    </div>
    
    <div class="bg-white rounded-2xl shadow-sm border border-gray-200 overflow-hidden">
        <div class="p-4 border-b flex justify-between items-center">
            <select id="yearSelect" class="p-2 border rounded-md outline-none focus:ring-2 focus:ring-indigo-500">
                <option value="2025">2025年</option>
                <option value="2024">2024年</option>
                <option value="2023">2023年</option>
            </select>
            <button id="loadBtn" class="gradient-bg text-white px-4 py-2 rounded-md font-bold hover:opacity-90 transition">加载数据</button>
        </div>
        <table class="w-full text-left border-collapse">
            <thead class="bg-gray-50 text-gray-600 text-sm uppercase font-medium">
                <tr>
                    <th class="px-6 py-4 border-b">高中学校</th>
                    <th class="px-6 py-4 border-b">收费类型</th>
                    <th class="px-6 py-4 border-b text-right">指标生出档分</th>
                </tr>
            </thead>
            <tbody id="quotaList" class="divide-y text-gray-700">
                <tr><td colspan="3" class="px-6 py-12 text-center text-gray-400 italic">请选择年份并加载数据</td></tr>
            </tbody>
        </table>
    </div>
</div>

<script>
document.getElementById('loadBtn').onclick = async () => {
    const year = document.getElementById('yearSelect').value;
    const res = await fetch(`/api/schools_by_batch?year=${year}`);
    const data = await res.json();
    
    const list = document.getElementById('quotaList');
    const quotaData = data['提前批_指标生'];
    
    list.innerHTML = quotaData.length ? quotaData.map(s => `
        <tr class="hover:bg-gray-50 transition">
            <td class="px-6 py-4 font-medium">${s.school_name}</td>
            <td class="px-6 py-4 text-sm">${s.fee_type || '-'}</td>
            <td class="px-6 py-4 text-right font-mono font-bold text-indigo-600">${s.min_score}分</td>
        </tr>
    `).join('') : '<tr><td colspan="3" class="px-6 py-12 text-center text-gray-400 italic">该年份暂无指标生数据</td></tr>';
};
</script>
{% endblock %}
