{% extends "base.html" %}
{% block title %}分数对比{% endblock %}
{% block content %}
<div class="max-w-4xl mx-auto text-center py-12">
    <div class="bg-white p-8 rounded-2xl shadow-sm border border-gray-200">
        <i class="fas fa-chart-line text-5xl text-indigo-600 mb-4"></i>
        <h2 class="text-2xl font-bold mb-4">分数对比分析</h2>
        <p class="text-gray-500 mb-8">该模块提供年度分数线波动分析，帮助您判断今年分数的趋势。</p>
        <div class="p-4 bg-indigo-50 text-indigo-700 rounded-lg text-sm italic">
            提示：请使用 [智能模拟] 模块获取基于当前分数的具体学校推荐。
        </div>
    </div>
</div>
{% endblock %}
