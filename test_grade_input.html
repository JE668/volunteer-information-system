<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>测试等级输入框</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-8">
    <div class="max-w-4xl mx-auto bg-white p-6 rounded-lg shadow">
        <h1 class="text-2xl font-bold mb-4">等级输入框测试</h1>
        
        <!-- 模式切换 -->
        <div class="flex gap-2 mb-6">
            <button onclick="switchMode('A')" id="tabA" class="px-4 py-2 rounded bg-indigo-600 text-white">A 类</button>
            <button onclick="switchMode('B')" id="tabB" class="px-4 py-2 rounded bg-gray-200">B 类</button>
        </div>
        
        <!-- 等级输入区域 -->
        <div class="bg-gray-50 p-4 rounded mb-4">
            <h2 class="font-bold mb-2">等级输入</h2>
            <div id="gradeGrid" class="grid grid-cols-2 gap-3">
                <!-- 动态生成 -->
            </div>
        </div>
        
        <!-- 调试信息 -->
        <div class="bg-yellow-50 p-4 rounded text-sm">
            <h3 class="font-bold mb-2">调试信息：</h3>
            <div id="debugInfo">等待初始化...</div>
        </div>
    </div>

    <script>
        let currentMode = 'A';
        const subjectConfigs = {
            'A': { 'bio': '生物', 'geo': '地理', 'his': '历史', 'pol': '道法' },
            'B': { 'bio': '生物', 'geo': '地理', 'phy': '物理', 'che': '化学' }
        };

        function switchMode(mode) {
            currentMode = mode;
            document.getElementById('tabA').className = mode === 'A' ? 'px-4 py-2 rounded bg-indigo-600 text-white' : 'px-4 py-2 rounded bg-gray-200';
            document.getElementById('tabB').className = mode === 'B' ? 'px-4 py-2 rounded bg-indigo-600 text-white' : 'px-4 py-2 rounded bg-gray-200';
            renderGradeInputs();
            updateDebug('Mode switched to: ' + mode);
        }

        function renderGradeInputs() {
            const grid = document.getElementById('gradeGrid');
            const config = subjectConfigs[currentMode];
            
            console.log('Rendering grades for mode:', currentMode);
            console.log('Config:', config);
            
            grid.innerHTML = Object.entries(config).map(([id, name]) => `
                <div>
                    <label class="block text-xs font-bold text-gray-500 uppercase mb-1">${name}</label>
                    <select id="grade_${id}" class="w-full p-2 border rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none bg-white">
                        <option value="A+" selected>A+</option>
                        <option value="A">A</option>
                        <option value="B+">B+</option>
                        <option value="B">B</option>
                        <option value="C">C</option>
                    </select>
                </div>
            `).join('');
            
            updateDebug('Rendered ' + Object.keys(config).length + ' subjects for mode ' + currentMode);
        }

        function updateDebug(msg) {
            const debugDiv = document.getElementById('debugInfo');
            const time = new Date().toLocaleTimeString();
            debugDiv.innerHTML = `[${time}] ${msg}<br>` + debugDiv.innerHTML;
        }

        // 页面加载完成后初始化
        document.addEventListener('DOMContentLoaded', function() {
            console.log('DOMContentLoaded triggered');
            updateDebug('DOMContentLoaded triggered');
            renderGradeInputs();
            updateDebug('Initial render complete');
        });
    </script>
</body>
</html>
